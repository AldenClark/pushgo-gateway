name: Zero Data Loss Gate

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/zero-data-loss-gate.yml"
      - "scripts/**"
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
  push:
    branches: [main]
    paths:
      - ".github/workflows/zero-data-loss-gate.yml"
      - "scripts/**"
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
  workflow_dispatch:
    inputs:
      pushgo_repo:
        description: "Apple repo (owner/name)"
        required: false
        default: ""
      pushgo_ref:
        description: "Apple repo ref (branch/tag/SHA)"
        required: false
        default: "main"
      pushgo_android_repo:
        description: "Android repo (owner/name)"
        required: false
        default: ""
      pushgo_android_ref:
        description: "Android repo ref (branch/tag/SHA)"
        required: false
        default: "main"

permissions:
  contents: read

jobs:
  gate:
    name: "Gate · ${{ matrix.target.id }}"
    runs-on: ${{ matrix.target.os }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - id: gateway
            os: ubuntu-latest
            run_gateway: "1"
            run_android: "0"
            run_apple: "0"
          - id: android
            os: ubuntu-latest
            run_gateway: "0"
            run_android: "1"
            run_apple: "0"
          - id: apple
            os: macos-15
            run_gateway: "0"
            run_android: "0"
            run_apple: "1"
    env:
      CHECKOUT_TOKEN: ${{ secrets.PUSHGO_CROSS_REPO_READ_TOKEN || github.token }}
      PUSHGO_REPO: ${{ github.event.inputs.pushgo_repo || format('{0}/pushgo', github.repository_owner) }}
      PUSHGO_REF: ${{ github.event.inputs.pushgo_ref || 'main' }}
      PUSHGO_ANDROID_REPO: ${{ github.event.inputs.pushgo_android_repo || format('{0}/pushgo-android', github.repository_owner) }}
      PUSHGO_ANDROID_REF: ${{ github.event.inputs.pushgo_android_ref || 'main' }}

    steps:
      - name: Checkout gateway
        uses: actions/checkout@v4
        with:
          path: gateway

      - name: Checkout pushgo (Apple)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.PUSHGO_REPO }}
          ref: ${{ env.PUSHGO_REF }}
          token: ${{ env.CHECKOUT_TOKEN }}
          path: pushgo

      - name: Checkout pushgo-android
        uses: actions/checkout@v4
        with:
          repository: ${{ env.PUSHGO_ANDROID_REPO }}
          ref: ${{ env.PUSHGO_ANDROID_REF }}
          token: ${{ env.CHECKOUT_TOKEN }}
          path: pushgo-android

      - name: Setup Rust
        if: ${{ matrix.target.run_gateway == '1' }}
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Java
        if: ${{ matrix.target.run_android == '1' }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Setup Android SDK
        if: ${{ matrix.target.run_android == '1' }}
        uses: android-actions/setup-android@v3

      - name: Run zero data-loss gate
        shell: bash
        env:
          RUN_GATEWAY: ${{ matrix.target.run_gateway }}
          RUN_ANDROID: ${{ matrix.target.run_android }}
          RUN_APPLE: ${{ matrix.target.run_apple }}
        run: |
          set -euo pipefail
          mkdir -p ci_artifacts
          {
            echo "gateway_repo=${GITHUB_REPOSITORY}"
            echo "target=${{ matrix.target.id }}"
            echo "gateway_sha=$(git -C gateway rev-parse HEAD)"
            echo "pushgo_repo=${PUSHGO_REPO} ref=${PUSHGO_REF} sha=$(git -C pushgo rev-parse HEAD)"
            echo "pushgo_android_repo=${PUSHGO_ANDROID_REPO} ref=${PUSHGO_ANDROID_REF} sha=$(git -C pushgo-android rev-parse HEAD)"
          } | tee "ci_artifacts/context-${{ matrix.target.id }}.txt"
          {
            if [[ "${RUN_GATEWAY}" == "1" ]]; then
              cd gateway
              cargo fmt --check
              cargo clippy --all-targets -- -D warnings
              cargo test
              cd ..
            fi

            if [[ "${RUN_ANDROID}" == "1" ]]; then
              cd pushgo-android
              ./gradlew --no-daemon test
              cd ..
            fi

            if [[ "${RUN_APPLE}" == "1" ]]; then
              cd pushgo
              swift test
              cd ..
            fi
          } 2>&1 | tee "ci_artifacts/zero-data-loss-${{ matrix.target.id }}.log"

      - name: Upload gate logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zero-data-loss-${{ matrix.target.id }}-${{ github.run_id }}
          path: ci_artifacts
          if-no-files-found: warn
          retention-days: 14
