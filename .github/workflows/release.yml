name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: # allow manual trigger

permissions:
  contents: write # create GitHub Releases
  packages: write # push to GHCR

env:
  BINARY_NAME: pushgo-gateway
  IMAGE_NAME: pushgo-gateway
  SOURCE_BINARY_NAME: pushgo-gateway

jobs:
  build-binaries:
    name: Build release binaries (x86_64 + aarch64 + arm32v7, gnu + musl)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add cross compilation targets
        run: |
          rustup target add x86_64-unknown-linux-musl
          rustup target add aarch64-unknown-linux-musl
          rustup target add armv7-unknown-linux-musleabihf

      - name: Install cross for musl targets
        run: cargo install cross --locked

      - name: Build release binaries (GNU in Debian 12 / glibc 2.36)
        run: |
          docker run --rm \
            -e SOURCE_BINARY_NAME="${SOURCE_BINARY_NAME}" \
            -v "${GITHUB_WORKSPACE}:/work" \
            -w /work \
            debian:bookworm \
            bash -lc '
              set -eux
              export DEBIAN_FRONTEND=noninteractive
              apt-get update
              apt-get install -y --no-install-recommends \
                ca-certificates curl build-essential pkg-config \
                gcc-aarch64-linux-gnu gcc-arm-linux-gnueabihf \
                libc6-dev-arm64-cross libc6-dev-armhf-cross
              rm -rf /var/lib/apt/lists/*
              curl https://sh.rustup.rs -sSf | sh -s -- -y --profile minimal
              . "$HOME/.cargo/env"
              rustup target add \
                x86_64-unknown-linux-gnu \
                aarch64-unknown-linux-gnu \
                armv7-unknown-linux-gnueabihf
              CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc \
                CARGO_TARGET_ARMV7_UNKNOWN_LINUX_GNUEABIHF_LINKER=arm-linux-gnueabihf-gcc \
                cargo build --release -p pushgo-gateway --bin "${SOURCE_BINARY_NAME}" --target x86_64-unknown-linux-gnu
              CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc \
                CARGO_TARGET_ARMV7_UNKNOWN_LINUX_GNUEABIHF_LINKER=arm-linux-gnueabihf-gcc \
                cargo build --release -p pushgo-gateway --bin "${SOURCE_BINARY_NAME}" --target aarch64-unknown-linux-gnu
              CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc \
                CARGO_TARGET_ARMV7_UNKNOWN_LINUX_GNUEABIHF_LINKER=arm-linux-gnueabihf-gcc \
                cargo build --release -p pushgo-gateway --bin "${SOURCE_BINARY_NAME}" --target armv7-unknown-linux-gnueabihf
            '

      - name: Verify amd64 GNU binary loads in bookworm-slim
        run: |
          docker run --rm \
            -e SOURCE_BINARY_NAME="${SOURCE_BINARY_NAME}" \
            -v "${GITHUB_WORKSPACE}:/work" \
            -w /work \
            debian:bookworm-slim \
            bash -lc '
              set -eux
              apt-get update
              apt-get install -y --no-install-recommends ca-certificates
              rm -rf /var/lib/apt/lists/*
              ./target/x86_64-unknown-linux-gnu/release/${SOURCE_BINARY_NAME} --help >/dev/null
            '

      - name: Build release binaries (musl)
        run: |
          cat > Cross.toml <<'EOF'
          [target.x86_64-unknown-linux-musl]
          image = "ghcr.io/cross-rs/x86_64-unknown-linux-musl:main"

          [target.aarch64-unknown-linux-musl]
          image = "ghcr.io/cross-rs/aarch64-unknown-linux-musl:main"

          [target.armv7-unknown-linux-musleabihf]
          image = "ghcr.io/cross-rs/armv7-unknown-linux-musleabihf:main"
          EOF
          cross build --release -p pushgo-gateway --bin ${{ env.SOURCE_BINARY_NAME }} --target x86_64-unknown-linux-musl
          cross build --release -p pushgo-gateway --bin ${{ env.SOURCE_BINARY_NAME }} --target aarch64-unknown-linux-musl
          cross build --release -p pushgo-gateway --bin ${{ env.SOURCE_BINARY_NAME }} --target armv7-unknown-linux-musleabihf

      - name: Collect binaries for artifacts and Docker
        run: |
          mkdir -p dist
          mkdir -p dist-docker
          cp target/x86_64-unknown-linux-gnu/release/${SOURCE_BINARY_NAME} dist/${BINARY_NAME}-amd64-gnu
          cp target/aarch64-unknown-linux-gnu/release/${SOURCE_BINARY_NAME} dist/${BINARY_NAME}-arm64-gnu
          cp target/armv7-unknown-linux-gnueabihf/release/${SOURCE_BINARY_NAME} dist/${BINARY_NAME}-armv7-gnu
          cp target/x86_64-unknown-linux-musl/release/${SOURCE_BINARY_NAME} dist/${BINARY_NAME}-amd64-musl
          cp target/aarch64-unknown-linux-musl/release/${SOURCE_BINARY_NAME} dist/${BINARY_NAME}-arm64-musl
          cp target/armv7-unknown-linux-musleabihf/release/${SOURCE_BINARY_NAME} dist/${BINARY_NAME}-armv7-musl
          cp dist/${BINARY_NAME}-amd64-gnu dist-docker/${BINARY_NAME}-amd64-gnu
          cp dist/${BINARY_NAME}-arm64-gnu dist-docker/${BINARY_NAME}-arm64-gnu
          cp dist/${BINARY_NAME}-armv7-gnu dist-docker/${BINARY_NAME}-armv7-gnu
          chmod +x dist/${BINARY_NAME}-amd64-gnu dist/${BINARY_NAME}-arm64-gnu dist/${BINARY_NAME}-armv7-gnu
          chmod +x dist/${BINARY_NAME}-amd64-musl dist/${BINARY_NAME}-arm64-musl dist/${BINARY_NAME}-armv7-musl
          chmod +x dist-docker/${BINARY_NAME}-amd64-gnu dist-docker/${BINARY_NAME}-arm64-gnu dist-docker/${BINARY_NAME}-armv7-gnu
          ls -l dist

      - name: Upload release binaries artifact
        uses: actions/upload-artifact@v4
        with:
          name: pushgo-release-binaries
          path: dist

      - name: Upload Docker binaries artifact (GNU only)
        uses: actions/upload-artifact@v4
        with:
          name: pushgo-docker-binaries
          path: dist-docker

  docker:
    name: Build & push multi-arch Docker image to GHCR
    runs-on: ubuntu-latest
    needs: build-binaries

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Download prebuilt binaries
        uses: actions/download-artifact@v4
        with:
          name: pushgo-docker-binaries
          path: dist

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract tag
        id: vars
        run: |
          echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_OUTPUT

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: . # includes dist/ and Dockerfile.gha
          file: ./Dockerfile.gha
          push: true
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          build-args: |
            BINARY_NAME=${{ env.BINARY_NAME }}
          tags: |
            ghcr.io/${{ steps.vars.outputs.owner_lc }}/${{ env.IMAGE_NAME }}:latest
            ghcr.io/${{ steps.vars.outputs.owner_lc }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.tag }}
            ghcr.io/${{ steps.vars.outputs.owner_lc }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-binaries, docker]

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Parse SemVer tag context
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if [[ "$tag" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)-beta\.([1-9][0-9]*)$ ]]; then
            semver="${BASH_REMATCH[1]}"
            changelog_section="Unreleased"
            prerelease="true"
          elif [[ "$tag" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            semver="${BASH_REMATCH[1]}"
            changelog_section="v${semver}"
            prerelease="false"
          else
            echo "Unsupported tag format: $tag"
            echo "Allowed formats: vX.Y.Z or vX.Y.Z-beta.N"
            exit 1
          fi
          {
            echo "semver=$semver"
            echo "changelog_section=$changelog_section"
            echo "prerelease=$prerelease"
          } >> "$GITHUB_OUTPUT"

      - name: Extract release notes from release/RELEASE_NOTES
        shell: bash
        run: |
          set -euo pipefail
          release_notes_file="release/RELEASE_NOTES.md"
          section="${{ steps.tag.outputs.changelog_section }}"
          if [[ ! -f "$release_notes_file" ]]; then
            echo "Missing $release_notes_file"
            exit 1
          fi
          section_body="$(awk -v sec="$section" '
            BEGIN { in_section = 0 }
            /^## \[/ {
              if (in_section == 1) exit
              if ($0 ~ "^## \\[" sec "\\]([[:space:]]|$|[[:space:]]-)") {
                in_section = 1
                next
              }
            }
            in_section == 1 { print }
          ' "$release_notes_file")"
          section_body="$(printf "%s\n" "$section_body" | sed -e :a -e '/^\n*$/{$d;N;ba' -e '}' )"
          if [[ -z "$section_body" ]]; then
            if [[ "${{ steps.tag.outputs.prerelease }}" == "true" ]]; then
              section_body=""
            else
              echo "RELEASE_NOTES section not found or empty: [$section]"
              exit 1
            fi
          fi
          release_body=""
          if [[ -n "$section_body" ]]; then
            release_notes_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/blob/${GITHUB_REF_NAME}/${release_notes_file}"
            release_body="# ${GITHUB_REF_NAME}"$'\n\n'"Source: [${release_notes_file}](${release_notes_url}) [$section]"$'\n\n'"$section_body"
          fi
          {
            echo "RELEASE_CHANGELOG_BODY<<__PUSHGO_GATEWAY_RELEASE_BODY_EOF__"
            printf "%s\n" "$release_body"
            echo "__PUSHGO_GATEWAY_RELEASE_BODY_EOF__"
          } >> "$GITHUB_ENV"

      - name: Download prebuilt binaries
        uses: actions/download-artifact@v4
        with:
          name: pushgo-release-binaries
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ env.RELEASE_CHANGELOG_BODY }}
          prerelease: ${{ steps.tag.outputs.prerelease }}
          files: |
            dist/${{ env.BINARY_NAME }}-amd64-gnu
            dist/${{ env.BINARY_NAME }}-arm64-gnu
            dist/${{ env.BINARY_NAME }}-armv7-gnu
            dist/${{ env.BINARY_NAME }}-amd64-musl
            dist/${{ env.BINARY_NAME }}-arm64-musl
            dist/${{ env.BINARY_NAME }}-armv7-musl
